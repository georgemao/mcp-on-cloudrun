apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: mcp-on-cloudrun-pipeline
serialPipeline:
  stages:
  - targetId: dev-env
    strategy:
      canary:
        runtimeConfig:
          cloudRun:
            automaticTrafficControl: true
        canaryDeployment:
          percentages: [25]
          verify: false
  - targetId: prod-env
--- # This defines the dev environment
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: dev-env
executionConfigs:
- usages:
  - RENDER
  - DEPLOY
  serviceAccount: cd-pipeline-sa@gmao-test-project.iam.gserviceaccount.com
run:
  location: projects/gmao-test-project/locations/us-central1
--- # This defines the prod environment
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: prod-env
requireApproval: true
executionConfigs:
- usages:
  - RENDER
  - DEPLOY
  serviceAccount: cd-pipeline-sa@gmao-test-project.iam.gserviceaccount.com
run:
  location: projects/gmao-test-project/locations/us-east5
--- # This automates the release from dev to prod
apiVersion: deploy.cloud.google.com/v1
kind: Automation
metadata:
  name: mcp-on-cloudrun-pipeline/promote
description: Promotes a release to the next target
suspended: false
serviceAccount: cd-pipeline-sa@gmao-test-project.iam.gserviceaccount.com
selector:
  targets:
  - id: dev-env
rules:
- promoteReleaseRule:
    id: "promote-release"
    wait: 1m
    destinationTargetId: "@next"
--- # This automates the advancement of the canary in dev
apiVersion: deploy.cloud.google.com/v1
kind: Automation
metadata:
  name: mcp-on-cloudrun-pipeline/advance
description: advances a rollout
suspended: false
serviceAccount: cd-pipeline-sa@gmao-test-project.iam.gserviceaccount.com
selector:
  targets:
  - id: dev-env
rules:
- advanceRolloutRule:
    id: "advance-rollout"
    sourcePhases: ["canary-25"]
    wait: 1m


# Run: gcloud deploy apply --file=clouddeploy.yaml --region=us-central1