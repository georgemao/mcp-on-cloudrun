steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}',
      '.'
    ]

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    waitFor: ['Build']
    args: [
      'push',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
    ]

  # 3. Scan for Vulnerabilities in the image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: VulnerabilityScan
    waitFor: ['Push']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        image='${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
        echo "Scanning image: $image"
        
        # Start the scan and capture the SCAN id
        # We use --remote because the image has already been pushed to Artifact Registry
        scan_name=$(gcloud artifacts docker images scan "$image" \
          --format='value(response.scan)' \
          --remote)
        
        echo "Scan completed. Scan ID: $scan_name"
        echo "Checking for findings matching threshold: $_SEVERITY_THRESHOLD"
        
        # Check for vulnerabilities matching the threshold regex (e.g. CRITICAL|HIGH)
        vulnerabilities=$(gcloud artifacts docker images list-vulnerabilities "$scan_name" \
          --format='value(vulnerability.effectiveSeverity)' | grep -E "$_SEVERITY_THRESHOLD" | wc -l || true)
        
        if [ "$vulnerabilities" -gt 0 ]; then
          echo "WARNING: Found $vulnerabilities findings matching '$_SEVERITY_THRESHOLD'."
          echo "Listing findings:"
          # List all and use grep to show only matching severities to avoid --filter issues
          gcloud artifacts docker images list-vulnerabilities "$scan_name" \
            --format='table(vulnerability.effectiveSeverity, vulnerability.shortDescription)' | grep -E "Severity|$_SEVERITY_THRESHOLD"
        else
          echo "SUCCESS: No findings matching '$_SEVERITY_THRESHOLD' found. Proceeding."
        fi

        echo ">>> Scan Completed. Continuing build."

  # 4. Create a Release in Cloud Deploy (Hands off to CD)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Deploy
    waitFor: ['VulnerabilityScan']
    entrypoint: gcloud
    args:
      - 'deploy'
      - 'releases'
      - 'create'
      - 'release-$SHORT_SHA'
      - '--delivery-pipeline=mcp-on-cloudrun-pipeline'
      - '--region=${_REGION}'
      - '--images=mcp-on-cloudrun=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
  
  
  # Deploy container image to Cloud Run
  #- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #  entrypoint: gcloud
  #  args:
  #    - 'run'
  #    - 'deploy'
  #    - '${_SERVICE_NAME}'
  #    - '--image'
  #    - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
  #    - '--region'
  #    - '${_REGION}'
  #    - '--platform'
  #    - 'managed'
  #    - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'

substitutions:
  _REGION: us-central1
  _REPOSITORY: gmao-repo
  _IMAGE_NAME: mcp-on-cloudrun
  _SERVICE_NAME: mcp-on-cloudrun
  _SEVERITY_THRESHOLD: 'CRITICAL|HIGH'

options:
  logging: CLOUD_LOGGING_ONLY
