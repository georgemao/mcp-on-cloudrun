steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}',
      '.'
    ]

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
    ]

  # Scan for Vulnerabilities in the image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: VulnerabilityScan
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo ">>> START: Vulnerability Scan"  # Add a clear marker

        _IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}"

        echo ">>> Scanning ${_IMAGE}"
        gcloud artifacts docker images scan "${_IMAGE}" --region="${_REGION}"

        # Retrieve the scan findings in JSON format (default)
        # The command automatically waits for the scan to complete.
        _SCAN_DATA=$(
            gcloud artifacts docker images describe "${_IMAGE}" --region="${_REGION}" --format="json(scanConfig.policyEvaluation)"
        )
        _CRITICAL=$(echo "$_SCAN_DATA" | jq -r .scanConfig.policyEvaluation.critical)
        _HIGH=$(echo "$_SCAN_DATA" | jq -r .scanConfig.policyEvaluation.high)

        echo ">>> Scan Results: High: $HIGH, Critical: $CRITICAL"

        # 2. Define the Fail-Safe Thresholds (e.g., 5 High, 2 Critical)
        _FAIL_HIGH=5
        _FAIL_CRITICAL=2

        # 3. Check if the scan is clear
        if [ "$_CRITICAL" -gt "$_FAIL_CRITICAL" ]; then
            echo "❌ BUILD WARNING: Critical vulnerabilities exceed the limit."
            #exit 1
        elif [ "$_HIGH" -gt "$_FAIL_HIGH" ]; then
            echo "❌ BUILD WARNING: High vulnerabilities exceed the limit."
            #exit 1
        fi

        echo ">>> Scan Completed. Continuing build."

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'

substitutions:
  _REGION: us-central1
  _REPOSITORY: gmao-repo
  _IMAGE_NAME: mcp-on-cloudrun
  _SERVICE_NAME: mcp-on-cloudrun

options:
  logging: CLOUD_LOGGING_ONLY
